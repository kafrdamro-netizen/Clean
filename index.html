<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تعلم اعادة التدوير</title>

<style>
body{
    margin:0;
    font-family:'Tahoma';
    direction:rtl;
    background:#e8f8f1;
}

/* حركة ظهور */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* رأس الصفحة */
header{
    background:linear-gradient(to left,#2ecc71,#27ae60);
    color:white;
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:bold;
    animation:fadeIn 1.5s ease;
}

/* تقسيم الصفحة */
.container{
    display:flex;
    min-height:500px;
}

/* القائمة */
nav{
    width:220px;
    background:white;
    padding:15px;
    box-shadow:2px 0 8px rgba(0,0,0,0.1);
}

/* الأزرار */
nav a{
    display:block;
    background:#2ecc71;
    color:white;
    text-decoration:none;
    padding:12px;
    margin-bottom:12px;
    text-align:center;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    background:#27ae60;
    transform:scale(1.08);
}

/* المحتوى */
.content{
    flex:1;
    padding:20px;
    animation:fadeIn 1.5s ease;
}

iframe{
    width:100%;
    height:500px;
    border:none;
    border-radius:15px;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* التذييل */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    font-size:14px;
}
</style>

</head>
<body>

<header>
🌍 تعلم اعادة التدوير من المنزل ♻️
</header>

<div class="container">

<nav>
    <a href="karton.html" target="page">📦 كرتون</a>
    <a href="blastic.html" target="page">🧴 بلاستيك</a>
    <a href="paper.html" target="page">📄 ورق</a>
    <a href="metal.html" target="page">🔩 معادن</a>
    <a href="other.html" target="page">♻️ أخرى</a>
</nav>

<div class="content">
    <iframe name="page"></iframe>
</div>

</div>

<footer>
حقوق الطبع والنشر محفوظة الطالب مصطفى مرعى ابو الفتوح  
الصف الرابع الابتدائي دارو شرق المحلة التعليمية
</footer>

</body>
</html>
