<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<style>
body{
    font-family:Tahoma;
    text-align:center;
    background:white;
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

h2{
    color:#27ae60;
}

img{
    width:200px;
    margin:15px;
    transition:0.5s;
}

img:hover{
    transform:rotate(5deg) scale(1.1);
}

p{
    font-size:18px;
}

/* تنسيق الفيديو */
iframe{
    margin-top:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>📦 اعادة تدوير الكرتون</h2>

<img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png">

<p>
يمكن استخدام صناديق الكرتون القديمة لصنع ألعاب  
أو علب تخزين مفيدة في المنزل.
</p>

<!-- فيديو يوتيوب -->
<iframe width="560" height="315" src="https://www.youtube.com/embed/wD-wEfPcLMk" frameborder="0" allowfullscreen></iframe>

</body>
</html>
